services:
  db:
    image: mysql:8.0
    container_name: ticket_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ticket_platform
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Script de inicialización de la BD ahora está en websockets/database temporalmente
      - ./websockets/database/init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: ticket_api
    restart: always
    depends_on:
      - db
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=ticket_platform
      - DB_USERNAME=root
      - DB_PASSWORD=root
    ports:
      - "8000:8000"
    volumes:
      - ./api:/var/www/html

  websockets:
    build:
      context: ./websockets
      dockerfile: Dockerfile
    container_name: ticket_websockets
    restart: always
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=ticket_platform
      - PORT=3001
    ports:
      - "3001:3001"
    volumes:
      - ./websockets:/app
      - websockets_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ticket_frontend
    restart: always
    depends_on:
      - websockets
    environment:
      - NUXT_PUBLIC_API_URL=http://localhost:8000
      - NUXT_PUBLIC_WS_URL=http://localhost:3001
      - HOST=0.0.0.0
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_nuxt:/app/.nuxt
    command: sh -c "npm install && npm run dev"

volumes:
  db_data:
  websockets_node_modules:
  frontend_node_modules:
  frontend_nuxt:
